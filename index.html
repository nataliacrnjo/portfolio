<!DOCTYPE html>

  <style>
    /* Reset and layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background-image: url('natalia bg-01.svg'); /* Replace with your SVG file */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Rain animation container */
    .rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }

    .drop {
      position: absolute;
      width: 4px;
      height: 20px;
      background: rgba(255, 255, 255, 0.3);
      animation: drop 1s linear forwards;
    }

    @keyframes drop {
      0% {
        transform: translateY(-20px);
        opacity: 0.5;
      }
      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* Right-side icon bar */
    .icon-bar {
      position: fixed;
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .icon-button {
      width: 80px;
      height: 80px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    

    .icon-button:hover {
      transform: scale(1.1);
    }

  .popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  width: 70vw;              /* 70% of viewport width */
  max-width: 600px;         /* never larger than 600px */
  height: 60vh;             /* 60% of viewport height */
  max-height: 500px;        /* never taller than 500px */
  transform: translate(100vw, -50%);
  background: white;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  z-index: 100;
  overflow: hidden;
  opacity: 0;
  transition: transform 0.5s ease, opacity 0.5s ease;
}


    .popup.show {
      display: block;
      transform: translate(-50%, -50%);
      opacity: 1;
    }

    .popup.hide {
      transform: translate(100vw, -50%);
      opacity: 0;
    }

 .popup-header {
  background: #333;
  color: white;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}


   .close-btn {
  font-size: 24px;
  color: white;
  cursor: pointer;
  padding: 0 10px;
}
.close-btn:hover {

}

    .popup-content {
      padding: 20px;
      height: calc(100% - 50px);
      overflow-y: auto;
    }

}

#popupImage1 {

#popupImage2 {

    .gallery {

}

.gallery img {

}

.gallery img:hover {

/* Image modal reuse */

.svg-call-btn img:hover {

}


  </style>

  <script>
    // Rain animation
    const rainContainer = document.querySelector('.rain');
    function createDrop() {
      const drop = document.createElement('div');
      drop.classList.add('drop');
      drop.style.left = Math.random() * window.innerWidth + 'px';
      drop.style.animationDuration = Math.random() * 0.5 + 0.8 + 's';
      rainContainer.appendChild(drop);
      setTimeout(() => drop.remove(), 1000);
    }
    setInterval(createDrop, 50);
// Popup open/close
function openPopup(id) {
  const popup = document.getElementById(id);
  popup.classList.add('show');
  popup.style.display = 'block';
}

function closePopup(id) {
  const popup = document.getElementById(id);
  popup.classList.remove('show');
  popup.classList.add('hide');
  setTimeout(() => {
    popup.classList.remove('hide');
    popup.style.display = 'none';
  }, 500);
}

function openNextImage(currentId, nextId) {
  closePopup(currentId);
  setTimeout(() => {
    openPopup(nextId);
  }, 500); // match transition delay
}
  // Open the new popup
  const popup = document.getElementById(id);
  popup.classList.add('show');
  popup.style.display = 'block';


function closePopup(id) {
  const popup = document.getElementById(id);
  popup.classList.remove('show');
  popup.classList.add('hide');
  setTimeout(() => {
    popup.classList.remove('hide');
    popup.style.display = 'none';
  }, 500); // match transition duration
}
function toggleMusic() {
  const audio = document.getElementById('backgroundMusic');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');

  if (audio.paused) {
    audio.play();
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'inline';
  } else {
    audio.pause();
    playIcon.style.display = 'inline';
    pauseIcon.style.display = 'none';
  }
}

  </script>
